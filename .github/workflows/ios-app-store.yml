name: Production iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name to use for the iOS IPA'
        required: false
        default: '1.0.0'
      build_number:
        description: 'Build number to use for the iOS IPA'
        required: false
        default: '1'

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      FLUTTER_VERSION: '3.24.5'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: |
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || sudo xcode-select --switch /Library/Developer/Xcode/Contents/Developer
          fi

      - name: Verify Xcode and SDK versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos | tail -n 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Verify Flutter Version
        run: flutter --version

      - name: Prepare iOS Code Signing and Hardening Xcode project
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          python3 ios_signer_helper.py

      - name: Verify Signing Configuration
        run: |
          echo "🔍 Verifying signing config in macOS runner environment..."
          echo "👉 Team ID: $APPLE_TEAM_ID"
          echo "👉 Profile Name: $PROFILE_NAME"
          echo "👉 UUID: $UUID"
          
          # Check profile file existence
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          if [ -f "$PROFILE_PATH" ]; then
            echo "✅ Provisioning profile exists at: $PROFILE_PATH"
            ls -lh "$PROFILE_PATH"
          else
            echo "❌ ERROR: Provisioning profile is MISSING at expected path: $PROFILE_PATH"
            exit 1
          fi
          
          # Check keychain certificates matching Distribution
          echo "🔐 Checking imported signing identities..."
          security find-identity -p codesigning -v

          # Verify GoogleService-Info.plist existence and content
          echo "📄 Verifying GoogleService-Info.plist..."
          ls -la ios/Runner/
          if [ -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "✅ GoogleService-Info.plist exists!"
            cat ios/Runner/GoogleService-Info.plist | head -n 15
          else
            echo "❌ ERROR: GoogleService-Info.plist is MISSING!"
            exit 1
          fi

      - name: Flutter Pub Get & CocoaPods
        run: |
          flutter pub get
          cd ios
          rm -rf Podfile.lock Pods
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          # --repo-update already refreshes specs; separate pod repo update is redundant and slow
          pod install --repo-update
          cd ..

      - name: Verify ExportOptions.plist
        run: |
          echo "📄 Verifying generated ExportOptions.plist..."
          if [ -f "ios/Runner/ExportOptions.plist" ]; then
            cat ios/Runner/ExportOptions.plist
            plutil -lint ios/Runner/ExportOptions.plist && echo "✅ ExportOptions.plist is valid XML."
          else
            echo "❌ ERROR: ExportOptions.plist is MISSING!"
            exit 1
          fi

      - name: Building IPA...
        run: |
          # Safe fallback using standard shell parameter expansion to avoid GHA expression parser errors.
          BUILD_NAME="${{ github.event.inputs.build_name }}"
          BUILD_NAME="${BUILD_NAME:-1.0.0}"
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          BUILD_NUMBER="${BUILD_NUMBER:-$GITHUB_RUN_NUMBER}"

          # Guard: FIREBASE_API_KEY must not be empty or Firebase crashes silently
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            echo "❌ FIREBASE_API_KEY secret is not set. Aborting build."
            exit 1
          fi

          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --verbose

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReagentKit-Signed-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER_ID" ] || [ -z "$API_KEY_BASE64" ]; then
            echo "🔶 App Store Connect secrets missing; skipping upload."
            exit 0
          fi
          IPA_PATH=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload."
            exit 1
          fi
          
          # Create standard private_keys directory in user home
          KEYS_DIR="$HOME/private_keys"
          mkdir -p "$KEYS_DIR"
          KEY_FILE="$KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          
          # Decode API key safely via python3 (single line — no YAML indentation issues)
          python3 -c "import base64,os,sys; k=os.environ.get('API_KEY_BASE64','').strip().replace('\n','').replace(' ',''); sys.exit('API_KEY_BASE64 empty') if not k else open(os.environ['KEY_FILE'],'wb').write(base64.b64decode(k))"
          echo "✅ Decoded App Store Connect API key."
          
          echo "🔍 Validating app with App Store Connect..."
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
            
          echo "🚀 Uploading app to App Store Connect..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
            
          # Clean up private key file
          rm -f "$KEY_FILE"

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f "$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
