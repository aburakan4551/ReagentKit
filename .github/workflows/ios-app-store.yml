name: Production iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name to use for the iOS IPA'
        required: false
        default: '1.0.0'
      build_number:
        description: 'Build number to use for the iOS IPA'
        required: false
        default: '1'

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-26
    timeout-minutes: 60

    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      FLUTTER_VERSION: '3.24.5'
      XCODE_SELECT_VERSION: '/Applications/Xcode.app/Contents/Developer'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || sudo xcode-select --switch /Library/Developer/Xcode/Contents/Developer

      - name: Verify Xcode and SDK versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos | tail -n 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Prepare iOS Code Signing and Hardening Xcode project
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          python3 ios_signer_helper.py

      - name: Verify Signing Configuration
        run: |
          echo "🔍 Verifying signing config in macOS runner environment..."
          echo "👉 Team ID: $APPLE_TEAM_ID"
          echo "👉 Profile Name: $PROFILE_NAME"
          echo "👉 UUID: $UUID"
          
          # Check profile file existence
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          if [ -f "$PROFILE_PATH" ]; then
            echo "✅ Provisioning profile exists at: $PROFILE_PATH"
            ls -lh "$PROFILE_PATH"
          else
            echo "❌ ERROR: Provisioning profile is MISSING at expected path: $PROFILE_PATH"
            exit 1
          fi
          
          # Check keychain certificates matching Distribution
          echo "🔐 Checking imported signing identities..."
          security find-identity -p codesigning -v

      - name: Flutter Pub Get & CocoaPods
        run: |
          flutter pub get
          cd ios
          rm -rf Podfile.lock Pods
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          pod repo update
          pod install --repo-update
          cd ..

      - name: Create ExportOptions.plist
        run: |
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_IDENTIFIER }}</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Building IPA...
        run: |
          BUILD_NAME=${{ github.event.inputs.build_name || '1.0.0' }}
          BUILD_NUMBER=${{ github.event.inputs.build_number || github.run_number }}
          
          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --verbose
        env:
          IPHONEOS_DEPLOYMENT_TARGET: '17.0'

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReagentKit-Signed-IPA
          path: build/ios/ipa/*.ipa

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_PRIVATE_KEYS_DIR: $RUNNER_TEMP/.appstoreconnect/private_keys
        run: |
          if [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER_ID" ] || [ -z "$API_KEY_BASE64" ]; then
            echo "🔶 App Store Connect secrets missing; skipping upload."
            exit 0
          fi
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload."
            exit 1
          fi
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          KEY_FILE="$API_PRIVATE_KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          python3 -c "import base64; data = '$API_KEY_BASE64'.strip().replace('\\n','').replace(' ',''); open('$KEY_FILE','wb').write(base64.b64decode(data))"
          echo "✅ Decoded App Store Connect API key to $KEY_FILE."
          xcrun altool --upload-app -f "$IPA_PATH" -t ios --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID" --verbose

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
