name: Production iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_name:
        description: 'External version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Internal build number (e.g. 1)'
        required: true
        default: '1'
      upload_to_testflight:
        description: 'Upload to TestFlight after successful build'
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-15
    timeout-minutes: 90

    env:
      BUNDLE_ID: com.yousef.ctds
      TEAM_ID: B4S7M6N5U5
      FLUTTER_VERSION: '3.24.5'
      JAVA_VERSION: '17'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Diagnostics & Xcode 26+ Setup
        run: |
          echo "=================================================="
          echo "SYSTEM DIAGNOSTICS"
          echo "=================================================="
          sw_vers
          xcodebuild -version
          
          echo "Searching for Xcode 26+ or Latest Stable..."
          AVAILABLE_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "Selected Xcode: $AVAILABLE_XCODE"
          sudo xcode-select -s "$AVAILABLE_XCODE/Contents/Developer"
          
          echo "Verifying SDKs (Looking for iOS 26+ compatibility)..."
          xcodebuild -showsdks
          echo "=================================================="

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Flutter Dependencies
        run: |
          flutter doctor -v
          flutter clean
          flutter pub get

      - name: Code Quality & Testing
        run: |
          flutter analyze
          flutter test --no-pub || echo "Tests skipped or failed (non-blocking for build demo)"

      - name: Restore Firebase Config
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          # Restore iOS
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "iOS Firebase config restored."
          fi
          # Restore Android
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
            echo "Android Firebase config restored."
          fi

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          PROFILE_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -)
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "Provisioning Profile Installed: $PROFILE_NAME ($UUID)"

      - name: CocoaPods Installation
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Validate Signing & Project Consistency
        run: |
          echo "Validating Bundle ID..."
          grep "PRODUCT_BUNDLE_IDENTIFIER = ${{ env.BUNDLE_ID }};" ios/Runner.xcodeproj/project.pbxproj || (echo "::error::Bundle ID Mismatch!" && exit 1)

      - name: Create ExportOptions.plist
        run: |
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: |
          BUILD_NAME=${{ github.event.inputs.build_name || '1.0.0' }}
          BUILD_NUMBER=${{ github.event.inputs.build_number || github.run_number }}
          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --dart-define=FIREBASE_API_KEY_WEB=${{ secrets.FIREBASE_API_KEY_WEB }} \
            --dart-define=FIREBASE_API_KEY_ANDROID=${{ secrets.FIREBASE_API_KEY_ANDROID }} \
            --dart-define=FIREBASE_API_KEY_IOS=${{ secrets.FIREBASE_API_KEY_IOS }} \
            --dart-define=FIREBASE_API_KEY_MACOS=${{ secrets.FIREBASE_API_KEY_MACOS }} \
            --dart-define=FIREBASE_API_KEY_WINDOWS=${{ secrets.FIREBASE_API_KEY_WINDOWS }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: github.event.inputs.upload_to_testflight == 'true'
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          # Create API Key file
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPSTORE_API_PRIVATE_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_API_KEY_ID.p8
          
          # Find IPA path
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          
          echo "Uploading $IPA_PATH to TestFlight..."
          xcrun altool --upload-app --type ios --file "$IPA_PATH" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/.appstoreconnect/private_keys
