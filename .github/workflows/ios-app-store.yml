name: Production iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name to use for the iOS IPA'
        required: false
        default: '1.0.0'
      build_number:
        description: 'Build number to use for the iOS IPA'
        required: false
        default: '1'

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      FLUTTER_VERSION: '3.32.0'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: |
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || sudo xcode-select --switch /Library/Developer/Xcode/Contents/Developer
          fi

      - name: Verify Xcode and SDK versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos | tail -n 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Verify Flutter Version
        run: flutter --version

      - name: Prepare iOS Code Signing and Hardening Xcode project
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          python3 ios_signer_helper.py

      - name: Verify Signing Configuration
        run: |
          echo "🔍 Verifying signing config in macOS runner environment..."
          echo "👉 Team ID: $APPLE_TEAM_ID"
          echo "👉 Profile Name: $PROFILE_NAME"
          echo "👉 UUID: $UUID"
          
          # Check profile file existence
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          if [ -f "$PROFILE_PATH" ]; then
            echo "✅ Provisioning profile exists at: $PROFILE_PATH"
            ls -lh "$PROFILE_PATH"
          else
            echo "❌ ERROR: Provisioning profile is MISSING at expected path: $PROFILE_PATH"
            exit 1
          fi
          
          # Check keychain certificates matching Distribution
          echo "🔐 Checking imported signing identities..."
          security find-identity -p codesigning -v

          # Verify GoogleService-Info.plist existence and content
          echo "📄 Verifying GoogleService-Info.plist..."
          ls -la ios/Runner/
          if [ -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "✅ GoogleService-Info.plist exists!"
            cat ios/Runner/GoogleService-Info.plist | head -n 15
          else
            echo "❌ ERROR: GoogleService-Info.plist is MISSING!"
            exit 1
          fi

      - name: Flutter Pub Get & CocoaPods Clean Build Pipeline
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData
          flutter pub get
          cd ios
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          pod install --repo-update
          cd ..

      - name: Verify ExportOptions.plist
        run: |
          echo "📄 Verifying generated ExportOptions.plist..."
          if [ -f "ios/Runner/ExportOptions.plist" ]; then
            cat ios/Runner/ExportOptions.plist
            plutil -lint ios/Runner/ExportOptions.plist && echo "✅ ExportOptions.plist is valid XML."
          else
            echo "❌ ERROR: ExportOptions.plist is MISSING!"
            exit 1
          fi

      - name: Building IPA...
        run: |
          # Safe fallback using standard shell parameter expansion to avoid GHA expression parser errors.
          BUILD_NAME="${{ github.event.inputs.build_name }}"
          BUILD_NAME="${BUILD_NAME:-1.0.0}"
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          BUILD_NUMBER="${BUILD_NUMBER:-$GITHUB_RUN_NUMBER}"

          # Guard: FIREBASE_API_KEY must not be empty or Firebase crashes silently
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            echo "❌ FIREBASE_API_KEY secret is not set. Aborting build."
            exit 1
          fi

          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --verbose

      - name: Forensic Signing Verification
        run: |
          echo "🔍 Starting post-build forensic signing verification..."
          
          # Find the built IPA
          IPA_PATH=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ ERROR: No IPA file found at build/ios/ipa/"
            exit 1
          fi
          echo "📦 Found IPA: $IPA_PATH"
          
          # Hash 1: Immediately after build
          echo "🧮 [HASH 1] Calculating SHA256 hash of the generated IPA..."
          shasum -a 256 "$IPA_PATH"
          
          # Create extraction directory
          EXTRACT_DIR="build/ios/ipa/extracted"
          mkdir -p "$EXTRACT_DIR"
          
          # Unzip IPA
          echo "🔓 Extracting IPA..."
          unzip -q "$IPA_PATH" -d "$EXTRACT_DIR"
          
          APP_PATH=$(find "$EXTRACT_DIR/Payload" -name "*.app" -maxdepth 2 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: No .app bundle found inside Payload directory of IPA!"
            exit 1
          fi
          echo "📱 Found App Bundle: $APP_PATH"
          
          # 1. security find-identity -p codesigning -v
          echo "🔐 [1/6] Listing installed signing identities on the runner..."
          security find-identity -p codesigning -v
          
          # 2. codesign -dv --verbose=4 Payload/Runner.app
          echo "✍️ [2/6] Running codesign diagnostics on the app bundle..."
          codesign -dv --verbose=4 "$APP_PATH"
          
          # 3. codesign --verify --deep --strict Payload/Runner.app
          echo "🧐 [3/6] Verifying signing integrity strictly..."
          codesign --verify --deep --strict "$APP_PATH"
          
          # 4. codesign -d --entitlements :- Payload/Runner.app
          echo "📜 [4/6] Extracting entitlements..."
          codesign -d --entitlements - "$APP_PATH"
          
          # 5. security cms -D -i Payload/Runner.app/embedded.mobileprovision
          echo "📄 [5/6] Extracting embedded provisioning profile details..."
          EMBEDDED_PROFILE="$APP_PATH/embedded.mobileprovision"
          if [ -f "$EMBEDDED_PROFILE" ]; then
            security cms -D -i "$EMBEDDED_PROFILE" > profile_decoded.plist
            # Print profile summary
            echo "--- Provisioning Profile Plist Summary ---"
            plutil -p profile_decoded.plist || cat profile_decoded.plist
          else
            echo "❌ ERROR: embedded.mobileprovision is MISSING inside the app bundle!"
            exit 1
          fi
          
          # 6. Deep recursive audit of nested components for Mixed Signing
          echo "🔍 [6/6] Starting deep nested signing audit for Mixed Signing..."
          while IFS= read -r -d '' COMPONENT; do
            echo "--------------------------------------------------"
            echo "📦 Auditing Component: $COMPONENT"
            
            # Print SHA256 of the component's Info.plist if it exists
            if [ -f "$COMPONENT/Info.plist" ]; then
              echo "📄 Info.plist SHA256: $(shasum -a 256 "$COMPONENT/Info.plist" | awk '{print $1}')"
            fi
            
            # Check if codesign thinks it is signed
            if codesign -d "$COMPONENT" >/dev/null 2>&1; then
              COMP_INFO=$(codesign -dvvv "$COMPONENT" 2>&1)
              echo "✅ Status: SIGNED"
              
              # Extract authority and team identifier
              AUTHORITY=$(echo "$COMP_INFO" | grep "Authority=" || true)
              TEAM_ID=$(echo "$COMP_INFO" | grep "TeamIdentifier=" || true)
              echo "   $AUTHORITY"
              echo "   $TEAM_ID"
              
              # Check if signed with Apple Distribution or iPhone Distribution
              echo "$COMP_INFO" | grep -E "Authority=Apple Distribution|Authority=iPhone Distribution" > /dev/null
              IS_DIST_SIGNED=$?
              if [ $IS_DIST_SIGNED -ne 0 ]; then
                echo "❌ COMPLIANCE FAILURE: Nested component is NOT signed with Apple Distribution!"
                echo "$COMP_INFO" | grep "Authority=" || true
                exit 1
              fi
            else
              # Unsigned component. Frameworks and appex targets MUST be signed.
              # Resource bundles (.bundle) might be signed or unsigned depending on Xcode build settings.
              if [[ "$COMPONENT" == *.framework ]] || [[ "$COMPONENT" == *.appex ]]; then
                echo "❌ COMPLIANCE FAILURE: Framework or App Extension is UNSIGNED!"
                exit 1
              else
                echo "⚠️ Warning: Component is unsigned (Resource Bundle without binary/signature)."
              fi
            fi
          done < <(find "$APP_PATH" \( -name "*.framework" -o -name "*.bundle" -o -name "*.appex" \) -print0)
          
          # --- AUTOMATED PIPELINE FAILS GUARDS ---
          echo "🚨 Running automated compliance assertions..."
          
          # Guard 1: Verify Export method in ExportOptions.plist
          if [ -f "ios/Runner/ExportOptions.plist" ]; then
            EXPORT_METHOD=$(plutil -extract method raw ios/Runner/ExportOptions.plist 2>/dev/null || echo "unknown")
            echo "👉 Export Method configured: $EXPORT_METHOD"
            if [ "$EXPORT_METHOD" != "app-store" ]; then
              echo "❌ COMPLIANCE ERROR: Export method is '$EXPORT_METHOD', must be 'app-store'!"
              exit 1
            fi
          else
            echo "❌ COMPLIANCE ERROR: ExportOptions.plist is missing!"
            exit 1
          fi
          
          # Guard 2: Verify Signing Identity is Apple Distribution (or iPhone Distribution)
          # We check the authority name in the codesign output
          CODESIGN_INFO=$(codesign -dvvv "$APP_PATH" 2>&1)
          echo "$CODESIGN_INFO" | grep -E "Authority=Apple Distribution|Authority=iPhone Distribution" > /dev/null
          IS_DISTRIBUTION=$?
          if [ $IS_DISTRIBUTION -ne 0 ]; then
            echo "❌ COMPLIANCE ERROR: The app bundle is NOT signed with an Apple Distribution certificate!"
            echo "Actual Authority info:"
            echo "$CODESIGN_INFO" | grep "Authority=" || true
            exit 1
          else
            echo "✅ Signed with Apple Distribution certificate."
          fi
          
          # Guard 3: Verify get-task-allow is false
          GET_TASK_ALLOW=$(codesign -d --entitlements - "$APP_PATH" 2>&1 | grep -A 1 "get-task-allow" | grep -E "<true/>|true" > /dev/null; echo $?)
          if [ $GET_TASK_ALLOW -eq 0 ]; then
            echo "❌ COMPLIANCE ERROR: 'get-task-allow' is set to true! This is a development signature and will be rejected by Apple."
            exit 1
          else
            echo "✅ 'get-task-allow' is false (correct for App Store submission)."
          fi
          
          # Guard 4: Verify Provisioning profile is Store (Production) and NOT Development / AdHoc
          if plutil -extract ProfileDistributionType raw profile_decoded.plist >/dev/null 2>&1; then
            PROFILE_TYPE=$(plutil -extract ProfileDistributionType raw profile_decoded.plist)
          else
            PROFILE_TYPE="STORE"
          fi
          echo "👉 Provisioning Profile Type: $PROFILE_TYPE"
          
          # Check get-task-allow in profile
          if plutil -extract Entitlements.get-task-allow raw profile_decoded.plist >/dev/null 2>&1; then
            PROFILE_GET_TASK_ALLOW=$(plutil -extract Entitlements.get-task-allow raw profile_decoded.plist)
          else
            PROFILE_GET_TASK_ALLOW="0"
          fi
          echo "👉 Provisioning Profile get-task-allow: $PROFILE_GET_TASK_ALLOW"
          
          # Check if ProvisionedDevices exists (Ad Hoc)
          if plutil -extract ProvisionedDevices raw profile_decoded.plist >/dev/null 2>&1; then
            HAS_DEVICES="present"
          else
            HAS_DEVICES="missing"
          fi
          echo "👉 ProvisionedDevices (should be missing): $HAS_DEVICES"
          
          if [ "$PROFILE_TYPE" != "STORE" ]; then
            echo "❌ COMPLIANCE ERROR: Provisioning Profile type is explicitly '$PROFILE_TYPE', must be 'STORE'!"
            exit 1
          fi
          
          if [ "$PROFILE_GET_TASK_ALLOW" = "1" ] || [ "$PROFILE_GET_TASK_ALLOW" = "true" ]; then
            echo "❌ COMPLIANCE ERROR: Provisioning profile has 'get-task-allow' set to true (Development profile)!"
            exit 1
          fi
          
          if [ "$HAS_DEVICES" != "missing" ]; then
            echo "❌ COMPLIANCE ERROR: Provisioning profile contains provisioned devices (Ad Hoc profile)! For App Store Connect submission, it must be App Store (STORE) without device list."
            exit 1
          fi
          
          echo "🎉 FORENSIC VERIFICATION PASSED: The build is 100% compliant with Apple App Store Connect submission requirements!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReagentKit-Signed-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER_ID" ] || [ -z "$API_KEY_BASE64" ]; then
            echo "🔶 App Store Connect secrets missing; skipping upload."
            exit 0
          fi
          IPA_PATH=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload."
            exit 1
          fi
          
          # Hash 2: Before uploading
          echo "🧮 [HASH 2] Calculating SHA256 hash of the IPA right before upload..."
          shasum -a 256 "$IPA_PATH"
          
          # Create standard private_keys directory in user home
          KEYS_DIR="$HOME/private_keys"
          mkdir -p "$KEYS_DIR"
          KEY_FILE="$KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          
          # Decode API key safely via python3 (single line — no YAML indentation issues)
          python3 -c "import base64,os,sys; k=os.environ.get('API_KEY_BASE64','').strip().replace('\n','').replace(' ',''); sys.exit('API_KEY_BASE64 empty') if not k else open(os.environ['KEY_FILE'],'wb').write(base64.b64decode(k))"
          echo "✅ Decoded App Store Connect API key."
          
          echo "🔍 Validating app with App Store Connect..."
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
            
          echo "🚀 Uploading app to App Store Connect..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
            
          # Hash 3: After uploading
          echo "🧮 [HASH 3] Calculating SHA256 hash of the IPA after upload is done..."
          shasum -a 256 "$IPA_PATH"
          
          # Clean up private key file
          rm -f "$KEY_FILE"

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f "$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
