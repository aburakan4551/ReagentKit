name: Production iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-14
    timeout-minutes: 60

    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      FLUTTER_VERSION: '3.24.5'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Installing certificate...
        env:
          B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Use Python for 100% reliable decoding of large strings
          python3 -c "import base64, os; data = os.environ['B64'].replace('\n', '').replace(' ', ''); open('$CERT_PATH', 'wb').write(base64.b64decode(data))"
          
          if [ ! -s "$CERT_PATH" ]; then echo "❌ Certificate file is empty!"; exit 1; fi
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "✅ Certificate imported."

      - name: Installing provisioning profile...
        env:
          B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          if [ -z "$B64" ]; then
            echo "ERROR: Provisioning Profile Secret is MISSING!"
            exit 1
          fi

          python3 -c "import base64, os; data = os.environ['B64'].strip().replace('\n', '').replace(' ', ''); open('$PP_PATH', 'wb').write(base64.b64decode(data))"

          echo "Diagnostic Info:"
          ls -lh "$PP_PATH"
          xxd -l 32 "$PP_PATH"

          if [ ! -s "$PP_PATH" ]; then
            echo "ERROR: Provisioning profile file is empty!"
            exit 1
          fi

          FILE_MAGIC=$(xxd -p -l 2 "$PP_PATH" | tr -d '[:space:]')
          echo "File magic: $FILE_MAGIC"
          if [ "$FILE_MAGIC" != "3082" ]; then
            echo "WARNING: Unexpected provisioning profile header. The decoded secret may be invalid or double-encoded."
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PAYLOAD="$RUNNER_TEMP/payload.xml"

          if security cms -D -i "$PP_PATH" > "$PAYLOAD" 2>/dev/null; then
            echo "Security CMS decoding successful."
          elif openssl cms -verify -inform DER -in "$PP_PATH" -noverify -out "$PAYLOAD" 2>/dev/null; then
            echo "OpenSSL CMS decoding successful."
          elif openssl smime -verify -inform DER -in "$PP_PATH" -noverify -out "$PAYLOAD" 2>/dev/null; then
            echo "OpenSSL SMIME decoding successful."
          else
            echo "WARNING: All decoding methods failed. Using raw profile bytes for extraction."
            cp "$PP_PATH" "$PAYLOAD"
          fi

          echo "Payload Preview:"
          head -n 20 "$PAYLOAD"

          UUID=$(grep -a -o 'UUID</key>.*<string>[^<]*</string>' "$PP_PATH" "$PAYLOAD" | head -n 1 | sed -n 's/.*<string>\([^<]*\)<\/string>.*/\1/p')
          PROFILE_NAME=$(grep -a -o 'Name</key>.*<string>[^<]*</string>' "$PP_PATH" "$PAYLOAD" | head -n 1 | sed -n 's/.*<string>\([^<]*\)<\/string>.*/\1/p')

          if [ -z "$UUID" ]; then
            echo "ERROR: Could not find UUID in payload!"
            grep -nE 'UUID|<key>Name</key>|<string>.*</string>' "$PAYLOAD" | head -n 60 || true
            exit 1
          fi

          if [ -z "$PROFILE_NAME" ]; then
            PROFILE_NAME="UnknownProvisioningProfile"
          fi

          echo "Found UUID: $UUID"
          echo "Found Profile Name: $PROFILE_NAME"

          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "Profile installed successfully."

      - name: Hardening Xcode Project Signing
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          
          # Force Manual Signing across ALL configurations
          sed -i '' 's/ProvisioningStyle = [^;]*;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          
          # Force Team ID
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ${{ env.APPLE_TEAM_ID }};/g" "$PROJECT_FILE"
          
          # Force Provisioning Profile Specifier
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = \"${{ env.PROFILE_NAME }}\";/g" "$PROJECT_FILE"
          
          # Set Code Sign Identity to Distribution
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "Apple Distribution";/g' "$PROJECT_FILE"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = [^;]*;/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "Apple Distribution";/g' "$PROJECT_FILE"
          
          echo "✅ Xcode project signing forced to Manual Distribution."

      - name: Flutter Pub Get & CocoaPods
        run: |
          flutter pub get
          cd ios && pod install --repo-update && cd ..

      - name: Create ExportOptions.plist
        run: |
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_IDENTIFIER }}</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Building IPA...
        run: |
          BUILD_NAME=${{ github.event.inputs.build_name || '1.0.0' }}
          BUILD_NUMBER=${{ github.event.inputs.build_number || github.run_number }}
          
          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReagentKit-Signed-IPA
          path: build/ios/ipa/*.ipa

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_PRIVATE_KEYS_DIR: $RUNNER_TEMP/.appstoreconnect/private_keys
        run: |
          if [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER_ID" ] || [ -z "$API_KEY_BASE64" ]; then
            echo "🔶 App Store Connect secrets missing; skipping upload."
            exit 0
          fi
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload."
            exit 1
          fi
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          KEY_FILE="$API_PRIVATE_KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          python3 -c "import base64; data = '$API_KEY_BASE64'.strip().replace('\\n','').replace(' ',''); open('$KEY_FILE','wb').write(base64.b64decode(data))"
          echo "✅ Decoded App Store Connect API key to $KEY_FILE."
          xcrun altool --upload-app -f "$IPA_PATH" -t ios --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID" --verbose

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
